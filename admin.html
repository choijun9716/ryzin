<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYZIN | 통합 관리자 센터</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v3.2.1/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #ff8730;
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #111;
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            position: fixed;
        }

        .logo { font-size: 20px; font-weight: 800; margin-bottom: 40px; color: var(--primary); }

        .nav-item {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-dim);
            font-weight: 600;
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        .nav-item:hover:not(.active) {
            background: #222;
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #333; color: white; }

        /* Hero Editor Grid */
        .hero-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .column-editor {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .image-list { display: flex; flex-direction: column; gap: 10px; }
        .image-item {
            background: #222;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }
        .image-item img { width: 40px; height: 55px; object-fit: cover; border-radius: 4px; }

        /* Portfolio Editor */
        .portfolio-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .port-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .port-card img { width: 100%; height: 180px; object-fit: cover; }
        .port-card-body { padding: 20px; }
        .port-card input, .port-card select {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: inherit;
        }

        /* Utils */
        .hidden { display: none; }
        .notification {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--primary); color: white;
            padding: 12px 24px; border-radius: 8px;
            transform: translateY(100px); transition: 0.3s;
        }
        .notification.show { transform: translateY(0); }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: var(--card-bg); width: 800px; padding: 30px; border-radius: 20px; }
        .asset-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 20px; }
        .asset-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">RYZIN ADMIN</div>
        <div class="nav-item active" onclick="showTab('hero')">메인 히어로 관리</div>
        <div class="nav-item" onclick="showTab('portfolio')">포트폴리오 관리</div>
        <div class="nav-item" onclick="showTab('assets')">라이브러리 (이미지 추가)</div>
        <div style="margin-top: 40px; padding: 20px; font-size: 12px; color: #555;">
            * 저장 버튼을 눌러야 실제 사이트에 반영됩니다.
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 id="tabTitle">메인 히어로 관리</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" onclick="resetAll()">초기화</button>
                <button class="btn btn-primary" onclick="syncToServer()" style="background:#007bff;">변경사항 서버 적용 (Commit & Push)</button>
            </div>
        </div>

        <!-- Tab 1: Hero -->
        <div id="tab-hero">
            <div class="hero-grid" id="heroGrid"></div>
        </div>

        <!-- Tab 2: Portfolio -->
        <div id="tab-portfolio" class="hidden">
            <div style="margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center;">
                <button class="btn btn-secondary" onclick="addPortfolioItem()">+ 새 포트폴리오 추가</button>
                <button id="syncBtn2" class="btn btn-primary" onclick="syncToServer()" style="background:#007bff;">실시간 서버 동기화 (Commit & Push)</button>
            </div>
            <div style="margin-bottom: 20px; display:flex; gap:10px; flex-wrap:wrap;" id="adminPortFilters">
                <button class="btn btn-primary" onclick="filterAdminPort('all')">전체보기</button>
                <button class="btn btn-secondary" onclick="filterAdminPort('beauty')">뷰티</button>
                <button class="btn btn-secondary" onclick="filterAdminPort('health')">건기식</button>
                <button class="btn btn-secondary" onclick="filterAdminPort('food')">식품</button>
                <button class="btn btn-secondary" onclick="filterAdminPort('fashion')">패션</button>
                <button class="btn btn-secondary" onclick="filterAdminPort('life')">라이프</button>
                <button class="btn btn-secondary" onclick="filterAdminPort('pet')">애견</button>
            </div>
            <div class="portfolio-list" id="portfolioList"></div>
        </div>

        <!-- Tab 3: Assets -->
        <div id="tab-assets" class="hidden">
            <div style="background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border);">
                <h3>새 이미지 추가</h3>
                <p style="color:var(--text-dim);">이미지 파일을 선택하여 업로드하세요. 파일은 자동으로 assets 폴더에 저장됩니다.</p>
                <div style="display:flex; gap:10px;">
                    <input type="file" id="imageUploadInput" accept="image/*" style="flex:1; background:#222; border:1px solid #444; color:white; padding:10px; border-radius:8px;">
                    <button id="uploadBtn" class="btn btn-primary" onclick="uploadAsset()">이미지 업로드</button>
                </div>
                <div class="asset-grid" id="libraryGrid" style="margin-top:40px;"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="imageModal">
        <div class="modal-content">
            <h2>이미지 선택</h2>
            <div class="asset-grid" id="modalAssetGrid"></div>
            <button class="btn btn-secondary" style="margin-top:20px;" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <div class="notification" id="notif">성공적으로 저장되었습니다!</div>

    <script>
        // Data State
        let heroConfig = {
            col1: ['everyhabit_enzyme.jpg', 'baegayul.jpg'],
            col2: ['bodylove.jpg', 'miyabis.jpg'],
            col3: ['yadah.jpg', 'natical.jpg'],
            col4: ['drolion.jpg', 'trusty.jpg']
        };

        let portData = [];

        function saveLocal() {
            localStorage.setItem('portfolio_data', JSON.stringify(portData));
            localStorage.setItem('hero_config', JSON.stringify(heroConfig));
        }

        async function initData() {
            try {
                let resPort, resHero;
                try {
                    resPort = await fetch('http://localhost:3000/portfolio.json?v=' + new Date().getTime());
                    resHero = await fetch('http://localhost:3000/hero.json?v=' + new Date().getTime());
                } catch(e) {
                    console.warn("오프라인 또는 서버 다운 상태입니다. 로컬 캐시를 불러옵니다.");
                }

                if(resPort && resPort.ok) {
                    portData = await resPort.json();
                    localStorage.setItem('portfolio_data', JSON.stringify(portData));
                } else {
                    const local = localStorage.getItem('portfolio_data');
                    if(local) portData = JSON.parse(local);
                }
                
                if(resHero && resHero.ok) {
                    heroConfig = await resHero.json();
                    localStorage.setItem('hero_config', JSON.stringify(heroConfig));
                } else {
                    const localHero = localStorage.getItem('hero_config');
                    if(localHero) heroConfig = JSON.parse(localHero);
                }
                
                // 렌더링 갱신
                if (!document.getElementById('tab-portfolio').classList.contains('hidden')) renderPortfolio();
                if (!document.getElementById('tab-hero').classList.contains('hidden')) renderHero();
            } catch (err) {
                console.error('Failed to load data:', err);
            }
        }
        initData();

        let library = JSON.parse(localStorage.getItem('asset_library')) || [
            'baegayul.jpg', 'bodylove.jpg', 'miyabis.jpg', 'yadah.jpg', 
            'natical.jpg', 'drolion.jpg', 'trusty.jpg', 'everyhabit_enzyme.jpg',
            'gangneung.jpg', 'dogshop.jpg', 'booie.jpg', '01.jpg', '002.jpg', '003.jpg'
        ];

        let activeCol = null;
        let activePortIdx = null;
        let activeHeroImgIdx = null;
        let activeModalType = null; // 'hero', 'hero_change', or 'portfolio'

        // Tabs
        function showTab(tab) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tabTitle').innerText = event.target.innerText;
            
            if(tab === 'hero') renderHero();
            if(tab === 'portfolio') renderPortfolio();
            if(tab === 'assets') renderLibrary();
        }

        // Hero Render
        function renderHero() {
            const grid = document.getElementById('heroGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 4; i++) {
                const colKey = `col${i}`;
                const div = document.createElement('div');
                div.className = 'column-editor';
                div.innerHTML = `
                    <div style="font-weight:800; margin-bottom:15px; color:var(--primary);">COLUMN ${i}</div>
                    <div class="image-list">
                        ${heroConfig[colKey].map((img, idx) => `
                            <div class="image-item" style="flex-wrap: wrap; padding: 10px; display: flex; align-items: center; gap: 10px; background: #222; border-radius: 10px;">
                                <img src="./assets/${img}">
                                <span style="flex:1; overflow:hidden; font-size:12px;">${img}</span>
                                <div style="display:flex; gap:4px; margin-left:auto; align-items:center;">
                                    <button class="btn btn-secondary" style="padding:4px 8px; font-size:11px;" onclick="openModal('hero_change', '${colKey}', ${idx})">변경</button>
                                    <button class="btn btn-secondary" style="padding:2px 5px; font-size:10px;" onclick="moveHeroUp('${colKey}', ${idx})">▲</button>
                                    <button class="btn btn-secondary" style="padding:2px 5px; font-size:10px;" onclick="moveHeroDown('${colKey}', ${idx})">▼</button>
                                </div>
                                <span style="cursor:pointer; color:#ff4444; margin-left:5px; font-weight:bold; font-size:14px;" onclick="removeHeroImg('${colKey}', ${idx})">✕</span>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-secondary" style="width:100%; margin-top:15px; font-size:12px;" onclick="openModal('hero', '${colKey}')">+ 추가</button>
                `;
                grid.appendChild(div);
            }
        }

        let currentAdminFilter = 'all';
        function filterAdminPort(cat) {
            currentAdminFilter = cat;
            document.querySelectorAll('#adminPortFilters .btn').forEach(b => {
                b.classList.remove('btn-primary');
                b.classList.add('btn-secondary');
            });
            event.target.classList.remove('btn-secondary');
            event.target.classList.add('btn-primary');
            renderPortfolio();
        }

        // Portfolio Render
        function renderPortfolio() {
            const list = document.getElementById('portfolioList');
            list.innerHTML = portData.map((item, idx) => {
                if (currentAdminFilter !== 'all' && item.category !== currentAdminFilter) return '';
                return `
                <div class="port-card">
                    <img src="${item.image}">
                    <div class="port-card-body">
                        <input type="text" value="${item.title}" onchange="updatePort(${idx}, 'title', this.value)" placeholder="제목">
                        <select onchange="updatePort(${idx}, 'category', this.value)">
                            <option value="beauty" ${item.category === 'beauty' ? 'selected' : ''}>뷰티</option>
                            <option value="health" ${item.category === 'health' ? 'selected' : ''}>건기식</option>
                            <option value="food" ${item.category === 'food' ? 'selected' : ''}>식품</option>
                            <option value="fashion" ${item.category === 'fashion' ? 'selected' : ''}>패션</option>
                            <option value="life" ${item.category === 'life' ? 'selected' : ''}>라이프</option>
                            <option value="pet" ${item.category === 'pet' ? 'selected' : ''}>애견</option>
                        </select>
                        <div style="display:flex; gap:5px; margin-bottom:10px;">
                            <input type="text" value="${item.image}" onchange="updatePort(${idx}, 'image', this.value)" placeholder="이미지 경로" style="flex:1; margin-bottom:0;">
                            <button class="btn btn-secondary" style="padding:0 10px; font-size:12px;" onclick="openModal('portfolio', ${idx})">선택</button>
                        </div>
                        <input type="text" value="${item.link}" onchange="updatePort(${idx}, 'link', this.value)" placeholder="링크 URL">
                        
                        <div style="display:flex; gap:5px; margin-bottom:10px;">
                            <button class="btn btn-secondary" style="flex:1; padding:5px; font-size:12px;" onclick="movePortUp(${idx})">▲ 위로</button>
                            <button class="btn btn-secondary" style="flex:1; padding:5px; font-size:12px;" onclick="movePortDown(${idx})">▼ 아래로</button>
                        </div>
                        <button class="btn btn-secondary" style="width:100%; color:#ff4444;" onclick="removePort(${idx})">삭제</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Library
        function renderLibrary() {
            const grid = document.getElementById('libraryGrid');
            grid.innerHTML = library.map(img => `<div class="asset-item"><img src="./assets/${img}"><p style="font-size:10px; color:#555;">${img}</p></div>`).join('');
        }

        async function uploadAsset() {
            const input = document.getElementById('imageUploadInput');
            const file = input.files[0];
            if(!file) return alert('업로드할 이미지 파일을 선택해주세요.');

            const btn = document.getElementById('uploadBtn');
            const originalText = btn.innerText;
            btn.innerText = '업로드 중...';
            btn.disabled = true;

            try {
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64Data = reader.result;
                    const response = await fetch('http://localhost:3000/api/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ filename: file.name, imageBase64: base64Data })
                    });
                    const result = await response.json();
                    if(result.success) {
                        if(!library.includes(file.name)) {
                            library.push(file.name);
                            localStorage.setItem('asset_library', JSON.stringify(library));
                            renderLibrary();
                        }
                        alert('이미지가 성공적으로 업로드되었습니다!');
                        input.value = ''; // Reset input
                    } else {
                        alert('업로드 실패: ' + result.error);
                    }
                    btn.innerText = originalText;
                    btn.disabled = false;
                };
                reader.readAsDataURL(file);
            } catch (err) {
                console.error(err);
                alert('서버 연결 실패! node server.js가 실행 중인지 확인하세요.');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Modal for Hero & Portfolio
        function openModal(type, targetIdx, extraIdx) {
            activeModalType = type;
            if(type === 'hero') {
                activeCol = targetIdx;
            } else if(type === 'hero_change') {
                activeCol = targetIdx;
                activeHeroImgIdx = extraIdx;
            } else if(type === 'portfolio') {
                activePortIdx = targetIdx;
            }
            document.getElementById('imageModal').style.display = 'flex';
            const grid = document.getElementById('modalAssetGrid');
            grid.innerHTML = library.map(img => `
                <div class="asset-item" onclick="selectModalImage('${img}')">
                    <img src="./assets/${img}">
                </div>
            `).join('');
        }
        function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
        
        function selectModalImage(img) {
            if(activeModalType === 'hero') {
                heroConfig[activeCol].push(img);
                saveLocal();
                renderHero();
            } else if(activeModalType === 'hero_change') {
                heroConfig[activeCol][activeHeroImgIdx] = img;
                saveLocal();
                renderHero();
            } else if(activeModalType === 'portfolio') {
                portData[activePortIdx].image = `./assets/${img}`;
                saveLocal();
                renderPortfolio();
            }
            closeModal();
        }
        function removeHeroImg(col, idx) {
            heroConfig[col].splice(idx, 1);
            saveLocal();
            renderHero();
        }
        function moveHeroUp(col, idx) {
            if(idx > 0) {
                const temp = heroConfig[col][idx - 1];
                heroConfig[col][idx - 1] = heroConfig[col][idx];
                heroConfig[col][idx] = temp;
                saveLocal();
                renderHero();
            }
        }
        function moveHeroDown(col, idx) {
            if(idx < heroConfig[col].length - 1) {
                const temp = heroConfig[col][idx + 1];
                heroConfig[col][idx + 1] = heroConfig[col][idx];
                heroConfig[col][idx] = temp;
                saveLocal();
                renderHero();
            }
        }

        // Port Actions
        function addPortfolioItem() {
            portData.unshift({ title: "새 프로젝트", category: "beauty", tagKey: "tag_beauty", image: "./assets/01.jpg", link: "#" });
            saveLocal();
            renderPortfolio();
        }
        function updatePort(idx, key, val) { 
            portData[idx][key] = val; 
            saveLocal();
        }
        function removePort(idx) { 
            portData.splice(idx, 1); 
            saveLocal();
            renderPortfolio(); 
        }
        function movePortUp(idx) {
            if(idx > 0) {
                const temp = portData[idx - 1];
                portData[idx - 1] = portData[idx];
                portData[idx] = temp;
                saveLocal();
                renderPortfolio();
            }
        }
        function movePortDown(idx) {
            if(idx < portData.length - 1) {
                const temp = portData[idx + 1];
                portData[idx + 1] = portData[idx];
                portData[idx] = temp;
                saveLocal();
                renderPortfolio();
            }
        }

        // Sync to Server (Commit & Push)
        async function syncToServer() {
            // 버튼 2개가 있을 수 있으므로 모두 비활성화
            const btns = document.querySelectorAll('[onclick="syncToServer()"]');
            btns.forEach(btn => {
                btn.dataset.originalText = btn.innerText;
                btn.innerText = '동기화 중...';
                btn.disabled = true;
            });

            try {
                const response = await fetch('http://localhost:3000/api/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ portfolio: portData, hero: heroConfig })
                });
                
                const result = await response.json();
                if(result.success) {
                    const notif = document.getElementById('notif');
                    notif.classList.add('show');
                    setTimeout(() => notif.classList.remove('show'), 3000);
                } else {
                    alert('오류 발생: ' + result.error);
                }
            } catch (err) {
                console.error(err);
                alert('서버 연결 실패! node server.js를 실행하여 로컬 서버를 구동 중인지 확인하세요.');
            } finally {
                btns.forEach(btn => {
                    btn.innerText = btn.dataset.originalText;
                    btn.disabled = false;
                });
            }
        }

        function resetAll() {
            if(confirm('모든 데이터를 초기화하시겠습니까?')) {
                localStorage.clear();
                location.reload();
            }
        }

        renderHero();
    </script>
</body>
</html>
