<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYZIN | 통합 관리자 센터</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v3.2.1/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #ff8730;
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-dim: #888888;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #111;
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            position: fixed;
        }

        .logo { font-size: 20px; font-weight: 800; margin-bottom: 40px; color: var(--primary); }

        .nav-item {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-dim);
            font-weight: 600;
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        .nav-item:hover:not(.active) {
            background: #222;
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #333; color: white; }

        /* Hero Editor Grid */
        .hero-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .column-editor {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .image-list { display: flex; flex-direction: column; gap: 10px; }
        .image-item {
            background: #222;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }
        .image-item img { width: 40px; height: 55px; object-fit: cover; border-radius: 4px; }

        /* Portfolio Editor */
        .portfolio-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .port-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .port-card img { width: 100%; height: 180px; object-fit: cover; }
        .port-card-body { padding: 20px; }
        .port-card input, .port-card select {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: inherit;
        }

        /* Utils */
        .hidden { display: none; }
        .notification {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--primary); color: white;
            padding: 12px 24px; border-radius: 8px;
            transform: translateY(100px); transition: 0.3s;
        }
        .notification.show { transform: translateY(0); }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: var(--card-bg); width: 800px; padding: 30px; border-radius: 20px; }
        .asset-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 20px; }
        .asset-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">RYZIN ADMIN</div>
        <div class="nav-item active" onclick="showTab('hero')">메인 히어로 관리</div>
        <div class="nav-item" onclick="showTab('portfolio')">포트폴리오 관리</div>
        <div class="nav-item" onclick="showTab('assets')">라이브러리 (이미지 추가)</div>
        <div style="margin-top: 40px; padding: 20px; font-size: 12px; color: #555;">
            * 저장 버튼을 눌러야 실제 사이트에 반영됩니다.
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 id="tabTitle">메인 히어로 관리</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" onclick="resetAll()">초기화</button>
                <button class="btn btn-primary" onclick="saveAll()">변경사항 저장</button>
            </div>
        </div>

        <!-- Tab 1: Hero -->
        <div id="tab-hero">
            <div class="hero-grid" id="heroGrid"></div>
        </div>

        <!-- Tab 2: Portfolio -->
        <div id="tab-portfolio" class="hidden">
            <div style="margin-bottom: 20px;">
                <button class="btn btn-secondary" onclick="addPortfolioItem()">+ 새 포트폴리오 추가</button>
            </div>
            <div class="portfolio-list" id="portfolioList"></div>
        </div>

        <!-- Tab 3: Assets -->
        <div id="tab-assets" class="hidden">
            <div style="background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border);">
                <h3>새 이미지 추가</h3>
                <p style="color:var(--text-dim);">assets 폴더에 이미지를 넣은 후, 파일명을 여기에 입력하세요.</p>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="newImgName" placeholder="예: my-new-image.jpg" style="flex:1; background:#222; border:1px solid #444; color:white; padding:12px; border-radius:8px;">
                    <button class="btn btn-primary" onclick="addNewAsset()">라이브러리에 추가</button>
                </div>
                <div class="asset-grid" id="libraryGrid" style="margin-top:40px;"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="imageModal">
        <div class="modal-content">
            <h2>이미지 선택</h2>
            <div class="asset-grid" id="modalAssetGrid"></div>
            <button class="btn btn-secondary" style="margin-top:20px;" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <div class="notification" id="notif">성공적으로 저장되었습니다!</div>

    <script>
        // Data State
        let heroConfig = JSON.parse(localStorage.getItem('hero_config')) || {
            col1: ['everyhabit_enzyme.jpg', 'baegayul.jpg'],
            col2: ['bodylove.jpg', 'miyabis.jpg'],
            col3: ['yadah.jpg', 'natical.jpg'],
            col4: ['drolion.jpg', 'trusty.jpg']
        };

        let portData = JSON.parse(localStorage.getItem('portfolio_data')) || [
            { title: "백아율", category: "beauty", image: "./assets/baegayul.jpg", link: "#" },
            { title: "에브리해빗", category: "health", image: "./assets/everyhabit_enzyme.jpg", link: "#" },
            { title: "부었냥", category: "food", image: "./assets/booie.jpg", link: "#" },
            { title: "야다", category: "beauty", image: "./assets/yadah.jpg", link: "#" }
        ];

        let library = JSON.parse(localStorage.getItem('asset_library')) || [
            'baegayul.jpg', 'bodylove.jpg', 'miyabis.jpg', 'yadah.jpg', 
            'natical.jpg', 'drolion.jpg', 'trusty.jpg', 'everyhabit_enzyme.jpg',
            'gangneung.jpg', 'dogshop.jpg', 'booie.jpg', '01.jpg', '02.jpg', '03.jpg'
        ];

        let activeCol = null;

        // Tabs
        function showTab(tab) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tabTitle').innerText = event.target.innerText;
            
            if(tab === 'hero') renderHero();
            if(tab === 'portfolio') renderPortfolio();
            if(tab === 'assets') renderLibrary();
        }

        // Hero Render
        function renderHero() {
            const grid = document.getElementById('heroGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 4; i++) {
                const colKey = `col${i}`;
                const div = document.createElement('div');
                div.className = 'column-editor';
                div.innerHTML = `
                    <div style="font-weight:800; margin-bottom:15px; color:var(--primary);">COLUMN ${i}</div>
                    <div class="image-list">
                        ${heroConfig[colKey].map((img, idx) => `
                            <div class="image-item">
                                <img src="./assets/${img}">
                                <span style="flex:1; overflow:hidden;">${img}</span>
                                <span style="cursor:pointer; color:red;" onclick="removeHeroImg('${colKey}', ${idx})">✕</span>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-secondary" style="width:100%; margin-top:15px; font-size:12px;" onclick="openModal('${colKey}')">+ 추가</button>
                `;
                grid.appendChild(div);
            }
        }

        // Portfolio Render
        function renderPortfolio() {
            const list = document.getElementById('portfolioList');
            list.innerHTML = portData.map((item, idx) => `
                <div class="port-card">
                    <img src="${item.image}">
                    <div class="port-card-body">
                        <input type="text" value="${item.title}" onchange="updatePort(${idx}, 'title', this.value)" placeholder="제목">
                        <select onchange="updatePort(${idx}, 'category', this.value)">
                            <option value="beauty" ${item.category === 'beauty' ? 'selected' : ''}>뷰티</option>
                            <option value="health" ${item.category === 'health' ? 'selected' : ''}>건기식</option>
                            <option value="food" ${item.category === 'food' ? 'selected' : ''}>식품</option>
                            <option value="fashion" ${item.category === 'fashion' ? 'selected' : ''}>패션</option>
                            <option value="life" ${item.category === 'life' ? 'selected' : ''}>라이프</option>
                            <option value="pet" ${item.category === 'pet' ? 'selected' : ''}>애견</option>
                        </select>
                        <input type="text" value="${item.image}" onchange="updatePort(${idx}, 'image', this.value)" placeholder="이미지 경로">
                        <input type="text" value="${item.link}" onchange="updatePort(${idx}, 'link', this.value)" placeholder="링크 URL">
                        <button class="btn btn-secondary" style="width:100%; color:#ff4444;" onclick="removePort(${idx})">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        // Library
        function renderLibrary() {
            const grid = document.getElementById('libraryGrid');
            grid.innerHTML = library.map(img => `<div class="asset-item"><img src="./assets/${img}"><p style="font-size:10px; color:#555;">${img}</p></div>`).join('');
        }

        function addNewAsset() {
            const name = document.getElementById('newImgName').value.trim();
            if(name) {
                library.push(name);
                localStorage.setItem('asset_library', JSON.stringify(library));
                renderLibrary();
                document.getElementById('newImgName').value = '';
            }
        }

        // Modal for Hero
        function openModal(col) {
            activeCol = col;
            document.getElementById('imageModal').style.display = 'flex';
            const grid = document.getElementById('modalAssetGrid');
            grid.innerHTML = library.map(img => `
                <div class="asset-item" onclick="addHeroImg('${img}')">
                    <img src="./assets/${img}">
                </div>
            `).join('');
        }
        function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
        function addHeroImg(img) {
            heroConfig[activeCol].push(img);
            renderHero();
            closeModal();
        }
        function removeHeroImg(col, idx) {
            heroConfig[col].splice(idx, 1);
            renderHero();
        }

        // Port Actions
        function addPortfolioItem() {
            portData.unshift({ title: "새 프로젝트", category: "beauty", image: "./assets/01.jpg", link: "#" });
            renderPortfolio();
        }
        function updatePort(idx, key, val) { portData[idx][key] = val; }
        function removePort(idx) { portData.splice(idx, 1); renderPortfolio(); }

        // Global Actions
        function saveAll() {
            localStorage.setItem('hero_config', JSON.stringify(heroConfig));
            localStorage.setItem('portfolio_data', JSON.stringify(portData));
            const notif = document.getElementById('notif');
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 3000);
        }

        function resetAll() {
            if(confirm('모든 데이터를 초기화하시겠습니까?')) {
                localStorage.clear();
                location.reload();
            }
        }

        renderHero();
    </script>
</body>
</html>
